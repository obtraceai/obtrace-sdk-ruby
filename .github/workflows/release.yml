name: Release

on:
  push:
    tags: ["v*"]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  auto-tag:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: obtrace-runners
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: tag
        run: |
          VERSION=$(grep 'VERSION' lib/obtrace_sdk/version.rb | sed 's/.*"\(.*\)"/\1/')
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    if: >-
      always() &&
      ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (needs.auto-tag.result == 'success' && needs.auto-tag.outputs.created == 'true'))
    needs: [auto-tag]
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto-tag.outputs.tag || github.ref_name }}
      - name: Set version
        id: version
        run: |
          TAG="${{ needs.auto-tag.outputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Install Ruby
        run: |
          apt-get update && apt-get install -y ruby || sudo apt-get update && sudo apt-get install -y ruby
      - name: Update version file
        run: sed -i "s/VERSION = .*/VERSION = \"${{ steps.version.outputs.version }}\"/" lib/obtrace_sdk/version.rb
      - name: Build gem
        run: gem build obtrace-sdk-ruby.gemspec
      - name: Push to RubyGems
        run: |
          mkdir -p ~/.gem
          echo ":rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          gem push obtrace-*.gem
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"${{ steps.version.outputs.tag }}\",\"generate_release_notes\":true}"
