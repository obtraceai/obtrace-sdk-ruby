name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v6
      - name: Install Ruby
        run: |
          sudo apt-get update && sudo apt-get install -y ruby ruby-bundler || apt-get update && apt-get install -y ruby ruby-bundler
      - run: gem install opentelemetry-sdk opentelemetry-api opentelemetry-exporter-otlp || true
      - run: ruby -c lib/obtrace_sdk.rb
      - run: ruby -c lib/obtrace_sdk/*.rb
      - run: ruby -Ilib test/semantic_metrics_test.rb
