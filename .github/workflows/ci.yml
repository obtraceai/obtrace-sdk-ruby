name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v6
      - name: Install Ruby
        run: |
          apt-get update && apt-get install -y ruby || sudo apt-get update && sudo apt-get install -y ruby
          ruby --version
      - run: ruby -c lib/obtrace_sdk.rb
      - run: ruby -c lib/obtrace_sdk/*.rb
      - run: ruby test/context_test.rb
