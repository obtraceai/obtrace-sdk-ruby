name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: obtrace-runners
    container:
      image: ruby:3.2-slim
    steps:
      - uses: actions/checkout@v6
      - run: ruby -c lib/obtrace_sdk.rb
      - run: ruby -c lib/obtrace_sdk/*.rb
      - run: ruby -Ilib test/semantic_metrics_test.rb
